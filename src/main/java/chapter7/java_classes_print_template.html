public class ConstructorOverloadingExample {

    private String name;
    private int age;

    // Default constructor
    public ConstructorOverloadingExample() {
        this.name = "Unknown";
        this.age = 0;
    }

    // Parameterized constructor
    public ConstructorOverloadingExample(String name, int age) {
        this.name = name;
        this.age = age;
    }

    public String getName() {
        return name;
    }

    public int getAge() {
        return age;
    }

    public static void main(String[] args) {
        ConstructorOverloadingExample defaultExample = new ConstructorOverloadingExample();
        System.out.println("Default Constructor - Name: " + defaultExample.getName() + ", Age: " + defaultExample.getAge());

        ConstructorOverloadingExample parameterizedExample = new ConstructorOverloadingExample("Alice", 30);
        System.out.println("Parameterized Constructor - Name: " + parameterizedExample.getName() + ", Age: " + parameterizedExample.getAge());

}

public class PiglatinFormOfAWord {

    public static String piglatin(String word) {
        if (word == null || word.isEmpty()) {
            return word; // Return the original word if it's null or empty
        }

        char firstLetter = Character.toLowerCase(word.charAt(0));
        String restOfWord = word.substring(1);

        if (isVowel(firstLetter)) {
            return word + "yay"; // If the first letter is a vowel, add "yay" to the end
        } else {
            return restOfWord + firstLetter + "ay"; // Move the first letter to the end and add "ay"
        }
    }

    private static boolean isVowel(char letter) {
        return "aeiou".indexOf(letter) != -1; // Check if the letter is a vowel
    }

    public static void main(String[] args) {
        String word1 = "hello";
        String word2 = "apple";
        String word3 = "string";

        System.out.println("Pig Latin of '" + word1 + "' is: " + piglatin(word1)); //ellohay
        System.out.println("Pig Latin of '" + word2 + "' is: " + piglatin(word2)); //appleyay
        System.out.println("Pig Latin of '" + word3 + "' is: " + piglatin(word3)); //tringsay
    }
}

public class ShallowCopyDeepCopyExample {

    public static class Person{
        private String name;
        private int age;

        public Person(String name, int age) {
            this.name = name;
            this.age = age;
        }

        public String getName() {
            return name;
        }

        public void setName(String name) {
            this.name = name;
        }

        public int getAge() {
            return age;
        }

        public void setAge(int age) {
            this.age = age;
        }

        @Override
        public String toString() {
            return "Person{name='" + name + "', age=" + age + "}";
        }
    }

    public static void main(String[] args) {
        // Shallow Copy Example
        Person originalPerson = new Person("Alice", 30);
        Person shallowCopyPerson = originalPerson; // This creates a shallow copy (reference copy)

        System.out.println("Original Person: " + originalPerson);
        System.out.println("Shallow Copy Person: " + shallowCopyPerson);

        // Modifying the shallow copy will affect the original
        shallowCopyPerson.setName("Bob");
        System.out.println("\nAfter modifying shallow copy:");
        System.out.println("Original Person: " + originalPerson);
        System.out.println("Shallow Copy Person: " + shallowCopyPerson);

        // Deep Copy Example
        Person deepCopyPerson = new Person(originalPerson.getName(), originalPerson.getAge()); // This creates a deep copy

        System.out.println("\nDeep Copy Person: " + deepCopyPerson);

        // Modifying the deep copy will NOT affect the original
        deepCopyPerson.setName("Charlie");
        System.out.println("\nAfter modifying deep copy:");
        System.out.println("Original Person: " + originalPerson);
        System.out.println("Deep Copy Person: " + deepCopyPerson);
    }
}
            `

    function escapeHtml(text) {

            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
