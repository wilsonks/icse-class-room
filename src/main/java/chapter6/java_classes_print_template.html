                public class RotateAStringVerticallyByK {

                    private static final int MAX_INDEX = 90;
                    private static final int MIN_INDEX = 65;
                    private static final int REEL_SIZE = 26;
                    private String str;

                    public void input() {
                        Scanner sc = new Scanner(System.in);
                        System.out.println("Enter a string: ");
                        str = sc.nextLine();
                    }

                    public void rotateStringVertically(int move) {
                        StringBuilder sb = new StringBuilder();
                        move = move % REEL_SIZE; //To handle cases where k is greater than the reel size, we take the modulus with the reel size. This ensures that the rotation wraps around correctly and prevents unnecessary rotations.

                        System.out.println("Starting to rotate string %s vertically by %s".formatted(str, move) );
                        for (int i = 0; i <= str.length() - 1; i++) {
                            int codePoint = str.codePointAt(i);
                            int nextCodePoint = str.codePointAt(i) + move;
                            if(codePoint + move > MAX_INDEX) {
                                nextCodePoint = codePoint + move - REEL_SIZE;
                            }
                            if(codePoint + move < MIN_INDEX) {
                                nextCodePoint = codePoint + move + REEL_SIZE;
                            }
                            sb.append((char) nextCodePoint);
                        }
                        str = sb.toString();
                        System.out.println("The rotated string is: " + str);
                    }


                    public static void main(String[] args) {
                        RotateAStringVerticallyByK obj = new RotateAStringVerticallyByK();
                        obj.input();
                        obj.rotateStringVertically(2);
                        obj.rotateStringVertically(-2);
                        obj.rotateStringVertically(-3);
                    }
                }

                public class CountWords {
                    private String str;
                    private int upperCount;
                    private int lowerCount;

                    void input(String input) {
                        str = input;
                        upperCount = 0;
                        lowerCount = 0;
                    }

                    void countWords() {
                        upperCount = 0;
                        lowerCount = 0;

                        if(str.isEmpty()) return;
                        if(Character.isUpperCase(str.charAt(0)) ) {
                            upperCount++;
                        } else {
                            lowerCount++;
                        }
                        for(int i = 0; i < str.length(); i++) {
                            char ch = str.charAt(i);
                            if(Character.isWhitespace(ch)) {
                                if(Character.isUpperCase(str.charAt(i+ 1))) {
                                    upperCount++;
                                }
                                if(Character.isLowerCase(str.charAt(i+ 1))) {
                                    lowerCount++;
                                }
                            }
                        }

                        System.out.println("upper count is " + upperCount);
                        System.out.println("lower count is " + lowerCount);
                    }

                    public static void main(String[] args) {
                        CountWords countWords = new CountWords();
                        countWords.input("Define a Word count Class in Java");
                        countWords.countWords();
                //        upper count is 4
                //        lower count is 3
                    }
                }

                public class Security {
                    private String name; // To store the name of the security
                    private int hour; //store number of hours
                    private double rate; //to store the hourly rate
                    private double wage; //to calculate wage

                    void get(String name, int hour, double rate) {
                        this.name = name;
                        this.hour = hour;
                        this.rate = rate;

                        /*
                            Upto 40 hours - 1 rupee per hour
                            next 20 hours - 1.5 rupee per hour
                            next 20 hours - 2 rupee per hour

                        if (hour <= 40) wage = 40 * rate;
                        if(hour > 40 && hour <= 60) {
                            wage = (hour - 40) * 1.5 * rate + 40 * rate ;

                        if(hour > 60 ) {
                            wage = ((hour - 60) * 2) + 20 * 1.5 * rate + 40 * rate ;
                        }

                        System.out.println("Hour: " + hour);
                        System.out.println("Rate: " + rate);

    const content = document.getElementById("content");

    classes.forEach((cls, index) => {

        const tocItem = document.createElement("li");
        tocItem.innerHTML =
            `<a href="#class-${index}">${cls.className}</a>`;
        toc.appendChild(tocItem);

        const page = document.createElement("div");
        page.className = "class-page";
        page.id = `class-${index}`;

        page.innerHTML = `
        <h2>${cls.className}</h2>

        <div class="metadata">
            <strong>Package:</strong> ${cls.packageName || ""}<br>
            <strong>Description:</strong> ${cls.description || ""}
        </div>

        <pre><code>${escapeHtml(cls.sourceCode || "")}</code></pre>
    `;

        content.appendChild(page);
    });

    function escapeHtml(text) {
        return text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
    }
